<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WhiteHolewithASM WebGL Preview</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="glcanvas" aria-label="White hole WebGL simulation"></canvas>
  <section class="hud">
    <div>
      <h1>WhiteHolewithASM</h1>
      <p>WebGL Codespaces preview</p>
    </div>
    <div class="controls">

    </div>
  </section>
  <noscript>This preview needs JavaScript enabled.</noscript>
  <script type="module" src="main.js"></script>
</body>
</html>
